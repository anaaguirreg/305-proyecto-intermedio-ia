<!DOCTYPE html>
<!-- sub_acto_2_2 — Mariposa VIF y Sexual por año (NNA vs Adultas).
     Componente: renderButterflyChart — dos instancias ECharts, selector de pestaña por grupo etario.
     Config display labels: config/master_exporter_config.json → acto_2_visualization.sub_acto_2_2
     Servir desde raíz del repositorio: python -m http.server 8000
     Abrir: http://localhost:8000/site/test_render_acto_2_2.html -->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Render test — Mariposa VIF/Sexual (sub_acto_2_2)</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@6.0.0/dist/echarts.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/typography.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-female: var(--color-primary);
      --color-male:   var(--color-primary);
    }
    body        { font-family: var(--font-sans); padding: 1rem 1.25rem; background: var(--color-canvas); color: var(--color-ink); }
    h2          { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.4rem; max-width: 1000px; }
    .anchor-text { font-size: 0.88rem; color: var(--color-muted); line-height: 1.55; max-width: 1000px; margin-bottom: 0.9rem; }
    .provisional-box {
      border-left: 3px solid var(--color-accent-amber); background: var(--color-accent-amber-soft);
      padding: 0.5rem 0.75rem; font-size: 0.85rem; color: var(--color-accent-amber);
      line-height: 1.5; max-width: 1000px; margin-bottom: 0.75rem;
    }

    /* Tab row */
    .tab-row { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }
    .tab-btn {
      padding: 0.3rem 0.9rem; font-size: 0.82rem; font-weight: 600;
      border: 1px solid var(--color-hairline); border-radius: 4px; cursor: pointer;
      background: var(--color-hairline); color: var(--color-muted);
    }
    .tab-btn.active { background: var(--color-ink); color: var(--color-canvas); border-color: var(--color-ink); }

    /* Charts grid */
    .charts-grid { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .chart-block { flex: 1 1 400px; max-width: 520px; }
    .chart-label { font-size: 0.82rem; font-weight: 700; color: var(--color-body); margin-bottom: 0.3rem; text-align: center; }
    .chart-el    { width: 100%; height: 320px; }

    details  { max-width: 1000px; margin-top: 0.8rem; font-size: 0.8rem; }
    summary  { cursor: pointer; font-weight: bold; padding: 0.25rem 0; }
    ul       { padding-left: 1.2rem; margin-top: 0.3rem; line-height: 1.85; }
    #error-msg { color: var(--color-error); margin-top: 1rem; font-size: 0.88rem; }
  </style>
</head>
<body>
  <h2 id="title"></h2>
  <div id="anchor-wrapper"></div>

  <div class="tab-row" id="tab-row">
    <button class="tab-btn active" data-tab="nna"    id="btn-nna">NNA (0–17)</button>
    <button class="tab-btn"        data-tab="adults" id="btn-adults">Mujeres adultas (18+)</button>
  </div>

  <div class="charts-grid">
    <div class="chart-block">
      <div class="chart-label" id="title-vif">Violencia intrafamiliar (VIF)</div>
      <div class="chart-el" id="chart-vif"></div>
    </div>
    <div class="chart-block">
      <div class="chart-label" id="title-sexual">Violencia sexual</div>
      <div class="chart-el" id="chart-sexual"></div>
    </div>
  </div>

  <details id="diagnostico">
    <summary>Diagnóstico de carga</summary>
    <ul id="diag-list"></ul>
  </details>
  <p id="error-msg" hidden></p>

  <script>
    /**
     * renderButterflyChart — bidirectional horizontal bar chart for VIF and Sexual violence.
     *
     * Input: sub_acto_2_2.data.{vif, sexual}
     *   Each is an array of 8 years with shape:
     *   { year, nna: {rate_f, rate_m, ratio, cases_f, cases_m}, adults: {...} }
     *
     * Two ECharts instances (one per violence type), each supporting
     * NNA / Adultas tab switch. Female rates → RIGHT (+), Male rates → LEFT (−).
     *
     * Display config labels read from master_exporter_config.json at runtime.
     */

    const getCssVar = (name) => getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    const CSS = {
      canvas:       getCssVar('--color-canvas'),       // #faf9f5
      ink:          getCssVar('--color-ink'),          // #1a1a18
      body:         getCssVar('--color-body'),         // #3d3d3a
      muted:        getCssVar('--color-muted'),        // #6c6a64
      mutedSoft:    getCssVar('--color-muted-soft'),   // #8e8b82
      hairline:     getCssVar('--color-hairline'),     // #e2dbd0
      primaryMid:   getCssVar('--color-primary-mid'),  // #7a2d52
      primaryDeep:  getCssVar('--color-primary-deep'), // #3d0f27
      primaryGhost: getCssVar('--color-primary-ghost'),// #f3ecef
      scale2:       getCssVar('--scale-2'),            // #e4c4c0
      scale3:       getCssVar('--scale-3'),            // #c4808a
      scale4:       getCssVar('--scale-4'),            // #8a3050
      scaleNull:    getCssVar('--scale-null'),         // #c8c4bc
    };

    const BRECHAS_URL = './data/acto_2_brechas.json';
    const CFG_URL     = './config/master_exporter_config.json';

    const COLOR_F = getComputedStyle(document.documentElement)
      .getPropertyValue('--color-female').trim();
    const COLOR_M = getComputedStyle(document.documentElement)
      .getPropertyValue('--color-male').trim();

    /* ── Anchor text renderer ────────────────────────────────────────────── */
    function renderAnchor(text) {
      const PROV = 'PROVISIONAL: ';
      const isProv = text.startsWith(PROV);
      const el = document.createElement(isProv ? 'div' : 'p');
      el.className = isProv ? 'provisional-box' : 'anchor-text';
      el.textContent = isProv ? text.slice(PROV.length) : text;
      document.getElementById('anchor-wrapper').appendChild(el);
    }

    /* ── Build ECharts option for butterfly ──────────────────────────────── */
    function buildOption(yearData, tab, cfg) {
      // Sort newest year at top → reverse chronological
      const sorted = [...yearData].sort((a, b) => b.year - a.year);
      const years    = sorted.map(d => String(d.year));
      const ratesF   = sorted.map(d => +(d[tab].rate_f.toFixed(1)));
      const ratesM   = sorted.map(d => -(+d[tab].rate_m.toFixed(1)));   // negative for left wing

      const axisMax = Math.ceil(Math.max(...ratesF, ...ratesF.map(v => Math.abs(v))) / 50) * 50;

      const axisLabel = cfg?.axis_labels_es ?? {};
      const legendLabel = cfg?.legend_labels_es ?? {};

      return {
        backgroundColor: CSS.canvas,
        grid: { left: 56, right: 70, top: 50, bottom: 48 },
        legend: {
          data: [legendLabel.female || 'Femenino', legendLabel.male || 'Masculino'],
          top: 5, textStyle: { fontSize: 11 },
        },
        xAxis: {
          type: 'value',
          min: -axisMax,
          max:  axisMax,
          axisLabel: {
            formatter: v => Math.abs(v),
            fontSize: 10,
          },
          name:         axisLabel.x || 'Tasa por 100.000 hab.',
          nameLocation: 'middle',
          nameGap:      30,
          nameTextStyle: { fontSize: 10, color: CSS.muted },
          splitLine: { lineStyle: { color: CSS.hairline } },
        },
        yAxis: {
          type: 'category',
          data: years,
          axisLabel: { fontSize: 11 },
        },
        series: [
          {
            name: legendLabel.female || 'Femenino',
            type: 'bar',
            stack: 'total',
            data: ratesF,
            itemStyle: { color: COLOR_F },
            label: {
              show: true,
              position: 'right',
              formatter: p => p.value > 0 ? p.value.toFixed(1) : '',
              fontSize: 9, color: CSS.body,
            },
          },
          {
            name: legendLabel.male || 'Masculino',
            type: 'bar',
            stack: 'total',
            data: ratesM,
            itemStyle: { color: COLOR_M, opacity: 0.5 },
            label: {
              show: true,
              position: 'left',
              formatter: p => p.value < 0 ? Math.abs(p.value).toFixed(1) : '',
              fontSize: 9, color: CSS.body,
            },
          },
        ],
        tooltip: {
          trigger: 'axis',
          axisPointer: { type: 'shadow' },
          formatter: params => {
            const year = params[0].name;
            const yearRow = yearData.find(d => String(d.year) === year);
            if (!yearRow) return year;
            const grp = yearRow[tab];
            return `<strong>${year}</strong><br>` +
              `Femenino: ${grp.rate_f.toFixed(1)}<br>` +
              `Masculino: ${grp.rate_m.toFixed(1)}<br>` +
              `Razón F/M: ${grp.ratio.toFixed(2)}×`;
          },
        },
      };
    }

    /* ── Main ────────────────────────────────────────────────────────────── */
    async function main() {
      const [brechasPayload, fullCfg] = await Promise.all([
        fetch(BRECHAS_URL).then(r => { if (!r.ok) throw new Error(`${BRECHAS_URL}: HTTP ${r.status}`); return r.json(); }),
        fetch(CFG_URL).then(r => { if (!r.ok) throw new Error(`${CFG_URL}: HTTP ${r.status}`); return r.json(); })
          .catch(() => ({})),   // config fetch failure is non-fatal
      ]);

      const sub     = brechasPayload.sub_acto_2_2;
      const data    = sub.data;
      const dispCfg = fullCfg?.acto_2_visualization?.sub_acto_2_2 ?? {};

      document.getElementById('title').textContent = sub.title_es;
      renderAnchor(sub.anchor_text_es);

      if (dispCfg.chart_titles) {
        document.getElementById('title-vif').textContent    = dispCfg.chart_titles.vif    || 'VIF';
        document.getElementById('title-sexual').textContent = dispCfg.chart_titles.sexual || 'Sexual';
      }

      const chartVif    = echarts.init(document.getElementById('chart-vif'));
      const chartSexual = echarts.init(document.getElementById('chart-sexual'));

      let activeTab = 'nna';

      function refresh() {
        chartVif.setOption(buildOption(data.vif,    activeTab, dispCfg), true);
        chartSexual.setOption(buildOption(data.sexual, activeTab, dispCfg), true);
      }

      refresh();
      window.addEventListener('resize', () => { chartVif.resize(); chartSexual.resize(); });

      /* Tab switching */
      document.getElementById('tab-row').addEventListener('click', e => {
        const btn = e.target.closest('.tab-btn');
        if (!btn) return;
        activeTab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
        refresh();
      });

      /* Diagnostics */
      const ul = document.getElementById('diag-list');
      const rows = [
        `Años VIF: ${data.vif.length} (esperado: 8)`,
        `Años Sexual: ${data.sexual.length} (esperado: 8)`,
        `Pestaña activa: ${activeTab}`,
        `Config display cargada: ${Object.keys(dispCfg).length > 0 ? 'sí' : 'no (fallback a constantes)'}`,
        `VIF 2025 ratio (NNA): ${data.vif.find(d => d.year === 2025)?.nna?.ratio ?? '—'}`,
      ];
      rows.forEach(t => { const li = document.createElement('li'); li.textContent = t; ul.appendChild(li); });
    }

    main().catch(err => {
      console.error(err);
      const p = document.getElementById('error-msg');
      p.textContent = `Error: ${err.message}`;
      p.hidden = false;
    });
  </script>
</body>
</html>
