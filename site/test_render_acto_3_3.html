<!DOCTYPE html>
<!-- sub_acto_3_3 — Dumbbell NNA vs Adultas (VIF y Sexual).
     Componente: renderDumbbell — ECharts scatter + markLine por par de endpoints.
     JSON: data/dashboard/acto_3_tipologia.json → sub_acto_3_3
     Servir desde raíz del repositorio: python -m http.server 8000
     Abrir: http://localhost:8000/site/test_render_acto_3_3.html -->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Render test — Dumbbell NNA vs Adultas (sub_acto_3_3)</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@6.0.0/dist/echarts.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/typography.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-nna:     var(--color-accent-teal);
      --color-adultas: var(--color-primary);
    }
    body        { font-family: var(--font-sans); padding: 1rem 1.25rem; background: var(--color-canvas); color: var(--color-ink); }
    h2          { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.4rem; max-width: 860px; }
    .subtitle   { font-size: 0.9rem; font-weight: 600; color: var(--color-body); margin-bottom: 0.3rem; max-width: 860px; }
    .anchor-text { font-size: 0.88rem; color: var(--color-muted); line-height: 1.55; max-width: 860px; margin-bottom: 0.9rem; }
    .provisional-box {
      border-left: 3px solid var(--color-accent-amber); background: var(--color-accent-amber-soft);
      padding: 0.5rem 0.75rem; font-size: 0.85rem; color: var(--color-accent-amber);
      line-height: 1.5; max-width: 860px; margin-bottom: 0.75rem;
    }
    .caveat-note {
      font-size: 0.82rem; color: var(--color-muted); font-style: italic; line-height: 1.5;
      max-width: 860px; border-top: 1px solid var(--color-hairline);
      padding-top: 0.5rem; margin-top: 0.5rem;
    }
    #chart   { width: 100%; max-width: 860px; height: 260px; }
    details  { max-width: 860px; margin-top: 0.8rem; font-size: 0.8rem; }
    summary  { cursor: pointer; font-weight: bold; padding: 0.25rem 0; }
    ul       { padding-left: 1.2rem; margin-top: 0.3rem; line-height: 1.85; }
    #error-msg { color: var(--color-error); margin-top: 1rem; font-size: 0.88rem; }
  </style>
</head>
<body>
  <h2 id="title"></h2>
  <div id="anchor-wrapper"></div>
  <div id="chart"></div>
  <p id="caveat" class="caveat-note" hidden></p>

  <details id="diagnostico">
    <summary>Diagnóstico de carga</summary>
    <ul id="diag-list"></ul>
  </details>
  <p id="error-msg" hidden></p>

  <script>
    /**
     * renderDumbbell — compares two endpoints (NNA vs Adultas) per violence type.
     *
     * JSON shape: data.lines = [{id, label, color, endpoints: [{group, label_display, cases, rate}]}]
     *   - Two lines: VIF and Sexual
     *   - Each line has two endpoints: nna (0–17) and adultas (18+)
     *   - Endpoints connected by a markLine (the "dumbbell bar")
     *
     * Y axis: violence type labels (from lines[].label)
     * X axis: rate per 100,000 inhabitants
     * Dots: scatter series, one per endpoint group (NNA, Adultas)
     * Connector: markLine within NNA series, coord-based
     */

    const getCssVar = (name) => getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    const CSS = {
      canvas:       getCssVar('--color-canvas'),       // #faf9f5
      ink:          getCssVar('--color-ink'),          // #1a1a18
      body:         getCssVar('--color-body'),         // #3d3d3a
      muted:        getCssVar('--color-muted'),        // #6c6a64
      mutedSoft:    getCssVar('--color-muted-soft'),   // #8e8b82
      hairline:     getCssVar('--color-hairline'),     // #e2dbd0
      primaryMid:   getCssVar('--color-primary-mid'),  // #7a2d52
      primaryDeep:  getCssVar('--color-primary-deep'), // #3d0f27
      primaryGhost: getCssVar('--color-primary-ghost'),// #f3ecef
      scale2:       getCssVar('--scale-2'),            // #e4c4c0
      scale3:       getCssVar('--scale-3'),            // #c4808a
      scale4:       getCssVar('--scale-4'),            // #8a3050
      scaleNull:    getCssVar('--scale-null'),         // #c8c4bc
    };

    const TIPOLOGIA_URL = './data/acto_3_tipologia.json';

    const COLOR_NNA     = getComputedStyle(document.documentElement)
      .getPropertyValue('--color-nna').trim();
    const COLOR_ADULTAS = getComputedStyle(document.documentElement)
      .getPropertyValue('--color-adultas').trim();

    /* ── Anchor text renderer ────────────────────────────────────────────── */
    function renderAnchor(text) {
      const PROV = 'PROVISIONAL: ';
      const isProv = text.startsWith(PROV);
      const el = document.createElement(isProv ? 'div' : 'p');
      el.className = isProv ? 'provisional-box' : 'anchor-text';
      el.textContent = isProv ? text.slice(PROV.length) : text;
      document.getElementById('anchor-wrapper').appendChild(el);
    }

    /* ── Main ────────────────────────────────────────────────────────────── */
    async function main() {
      const payload = await fetch(TIPOLOGIA_URL).then(r => {
        if (!r.ok) throw new Error(`${TIPOLOGIA_URL}: HTTP ${r.status}`);
        return r.json();
      });

      const sub   = payload.sub_acto_3_3;
      const data  = sub.data;
      const lines = data.lines;  // [{id, label, color, endpoints}]

      document.getElementById('title').textContent = sub.title_es;
      renderAnchor(sub.anchor_text_es);

      const caveatEl = document.getElementById('caveat');
      if (sub.caveat_es) {
        const PROV = 'PROVISIONAL: ';
        caveatEl.textContent = sub.caveat_es.startsWith(PROV)
          ? sub.caveat_es.slice(PROV.length)
          : sub.caveat_es;
        caveatEl.hidden = false;
      }

      // Category labels for y-axis (one per line)
      const lineLabels = lines.map(l => l.label);   // ['Violencia intrafamiliar', 'Violencia sexual']

      // Endpoint groups: nna (index 0) and adultas (index 1) per convention
      const nnaPoints     = lines.map((l, yi) => {
        const ep = l.endpoints.find(e => e.group === 'nna') || l.endpoints[0];
        return { value: [ep.rate, yi], _ep: ep, _label: l.label };
      });
      const adultasPoints = lines.map((l, yi) => {
        const ep = l.endpoints.find(e => e.group === 'adultas') || l.endpoints[1];
        return { value: [ep.rate, yi], _ep: ep, _label: l.label };
      });

      // Mark lines connecting each pair of endpoints (one per y-category)
      const markLineData = lines.map((l, yi) => {
        const nna     = l.endpoints.find(e => e.group === 'nna')     || l.endpoints[0];
        const adultas = l.endpoints.find(e => e.group === 'adultas') || l.endpoints[1];
        return [
          { coord: [nna.rate,     yi] },
          { coord: [adultas.rate, yi] },
        ];
      });

      const chart = echarts.init(document.getElementById('chart'));
      chart.setOption({
        backgroundColor: CSS.canvas,
        grid: { left: 185, right: 80, top: 50, bottom: 60 },
        legend: {
          data: [
            {name: 'NNA (0–17)',       icon: 'circle'},
            {name: 'Adultas (18+)',     icon: 'circle'},
          ],
          top: 5, textStyle: { fontSize: 11 },
        },
        xAxis: {
          type: 'value',
          name: 'Tasa por 100.000 habitantes',
          nameLocation: 'middle',
          nameGap: 36,
          nameTextStyle: { fontSize: 11, color: CSS.muted },
          axisLabel: { fontSize: 11 },
          splitLine: { lineStyle: { color: CSS.hairline } },
          min: 0,
        },
        yAxis: {
          type: 'category',
          data: lineLabels,
          axisLabel: { fontSize: 12, width: 170, overflow: 'break' },
        },
        tooltip: {
          trigger: 'item',
          formatter: params => {
            const d = params.data;
            if (!d || !d._ep) return '';
            return `<strong>${d._label}</strong><br>` +
              `${d._ep.label_display}<br>` +
              `Tasa: ${d._ep.rate.toFixed(2)} / 100.000<br>` +
              `Casos: ${d._ep.cases.toLocaleString('es')}`;
          },
        },
        series: [
          {
            name: 'NNA (0–17)',
            type: 'scatter',
            symbolSize: 16,
            itemStyle: { color: COLOR_NNA },
            data: nnaPoints,
            label: {
              show: true,
              position: 'top',
              formatter: p => p.data._ep.rate.toFixed(1),
              fontSize: 10,
              color: COLOR_NNA,
            },
            markLine: {
              silent: true,
              symbol: ['none', 'none'],
              lineStyle: { color: CSS.scaleNull, width: 2.5, type: 'solid' },
              label: { show: false },
              data: markLineData,
            },
          },
          {
            name: 'Adultas (18+)',
            type: 'scatter',
            symbolSize: 16,
            itemStyle: { color: COLOR_ADULTAS },
            data: adultasPoints,
            label: {
              show: true,
              position: 'top',
              formatter: p => p.data._ep.rate.toFixed(1),
              fontSize: 10,
              color: COLOR_ADULTAS,
            },
          },
        ],
      });

      window.addEventListener('resize', () => chart.resize());

      /* Diagnostics */
      const ul = document.getElementById('diag-list');
      const rows = [
        `Líneas renderizadas: ${lines.length} (esperado: 2)`,
        `caveat_es presente: ${sub.caveat_es != null ? 'sí' : 'no'}`,
        `VIF NNA rate: ${lines.find(l=>l.id==='vif')?.endpoints.find(e=>e.group==='nna')?.rate ?? '—'} (esperado: 52.96)`,
        `Sexual Adultas rate: ${lines.find(l=>l.id==='sexual')?.endpoints.find(e=>e.group==='adultas')?.rate ?? '—'} (esperado: 77.59)`,
        `Método de agregación: ${data.aggregation_method}`,
      ];
      rows.forEach(t => { const li = document.createElement('li'); li.textContent = t; ul.appendChild(li); });
    }

    main().catch(err => {
      console.error(err);
      const p = document.getElementById('error-msg');
      p.textContent = `Error: ${err.message}`;
      p.hidden = false;
    });
  </script>
</body>
</html>
